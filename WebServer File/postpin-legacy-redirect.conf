# ─────────────────────────────────────────────────────────────────────────────
# Postpin — LEGACY SUBDOMAIN 301s  (postpin.creatibyte.in → postpin.in)
#
# Permanently redirects every old-subdomain URL to the same path on the new
# domain. This is what transfers the Google ranking credit the subdomain
# earned — keep it live for AT LEAST 6–12 months (ideally forever).
#
# PREREQUISITE: DNS A records for BOTH old hostnames must point at this VPS
# again (they were removed):
#   postpin.creatibyte.in      A  →  <this VPS IP>
#   api.postpin.creatibyte.in  A  →  <this VPS IP>
#
# Install on Ubuntu:
#   sudo cp postpin-legacy-redirect.conf /etc/nginx/sites-available/postpin-legacy-redirect
#   sudo ln -s /etc/nginx/sites-available/postpin-legacy-redirect /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add/renew certificates (needed so https:// old links redirect cleanly;
# certbot copies these blocks to 443 automatically):
#   sudo certbot --nginx -d postpin.creatibyte.in -d api.postpin.creatibyte.in
#
# Verify afterwards:
#   curl -sI https://postpin.creatibyte.in/pricing | grep -i location
#     → Location: https://postpin.in/pricing
#   curl -sI https://api.postpin.creatibyte.in/uploads/x.png | grep -i location
#     → Location: https://api.postpin.in/uploads/x.png
# ─────────────────────────────────────────────────────────────────────────────

# Old website (incl. www variant) → new website (path + query preserved).
server {
    listen 80;
    listen [::]:80;
    server_name postpin.creatibyte.in www.postpin.creatibyte.in;

    access_log /var/log/nginx/postpin-legacy.access.log;

    return 301 https://postpin.in$request_uri;
}

# Old API → new API. Kept as a redirect (not proxy) so uploaded media URLs
# (avatars, blog covers) stored in the database with the old host keep
# working — browsers follow 301s for <img> requests.
server {
    listen 80;
    listen [::]:80;
    server_name api.postpin.creatibyte.in;

    access_log /var/log/nginx/postpin-legacy-api.access.log;

    return 301 https://api.postpin.in$request_uri;
}
