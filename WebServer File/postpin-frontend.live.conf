# ─────────────────────────────────────────────────────────────────────────────
# Postpin — FRONTEND (Next.js) — LIVE conf as deployed on the VPS
# (post-certbot: contains the managed 443 blocks; do NOT run the plain
#  postpin-frontend.conf over this or HTTPS breaks)
#
# Diff vs certbot baseline: + http2 on 443 listens, + gzip_vary/comp_level,
# + server_tokens off in the serving blocks.
#
# Apply: paste over /etc/nginx/sites-available/postpin-frontend.conf
#   sudo nginx -t && sudo systemctl reload nginx
# Verify:
#   curl -sI https://postpin.in/ | grep -iE "^HTTP|^server"
#   → HTTP/2 200   and   server: nginx  (no version)
# ─────────────────────────────────────────────────────────────────────────────

# www → apex. The API's CORS/cookies allow EXACTLY postpin.in, so the
# app must never be served from www.
server {
    server_name www.postpin.in;

    server_tokens off;

    return 301 $scheme://postpin.in$request_uri;

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/postpin.in/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/postpin.in/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# The app
server {
    server_name postpin.in;

    access_log /var/log/nginx/postpin-frontend.access.log;
    error_log  /var/log/nginx/postpin-frontend.error.log;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    server_tokens off;

    client_max_body_size 2m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Immutable build assets — cache hard in the browser.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    listen [::]:443 ssl http2 ipv6only=on; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/postpin.in/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/postpin.in/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = postpin.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name postpin.in;
    server_tokens off;
    return 404; # managed by Certbot


}
server {
    if ($host = www.postpin.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name www.postpin.in;
    server_tokens off;
    return 404; # managed by Certbot


}
