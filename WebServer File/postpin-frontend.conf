# ─────────────────────────────────────────────────────────────────────────────
# Postpin — FRONTEND (Next.js) nginx config  (plain HTTP; certbot adds SSL)
# Domains: postpin.creatibyte.in (app)  ·  www.postpin.creatibyte.in (301 → apex)
# Upstream: Next.js on 127.0.0.1:3000  (adjust if PM2 assigns another port)
#
# Install on Ubuntu:
#   sudo cp postpin-frontend.conf /etc/nginx/sites-available/postpin-frontend
#   sudo ln -s /etc/nginx/sites-available/postpin-frontend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add certificates (this ALSO adds the 443 blocks + HTTP→HTTPS redirects):
#   sudo certbot --nginx -d postpin.creatibyte.in -d www.postpin.creatibyte.in
# ─────────────────────────────────────────────────────────────────────────────

# www → apex. The API's CORS/cookies allow EXACTLY postpin.creatibyte.in, so the
# app must never be served from www. ($scheme keeps this correct after certbot
# copies the block to 443.)
server {
    listen 80;
    listen [::]:80;
    server_name www.postpin.creatibyte.in;

    return 301 $scheme://postpin.creatibyte.in$request_uri;
}

# The app
server {
    listen 80;
    listen [::]:80;
    server_name postpin.creatibyte.in;

    access_log /var/log/nginx/postpin-frontend.access.log;
    error_log  /var/log/nginx/postpin-frontend.error.log;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 2m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Immutable build assets — cache hard in the browser.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
