# ─────────────────────────────────────────────────────────────────────────────
# Postpin — BACKEND (Fastify API) nginx config  (plain HTTP; certbot adds SSL)
# Domain:   api.postpin.in
# Upstream: Fastify on 127.0.0.1:4000  (adjust if PM2 assigns another port)
#
# Install on Ubuntu:
#   sudo cp postpin-backend.conf /etc/nginx/sites-available/postpin-backend
#   sudo ln -s /etc/nginx/sites-available/postpin-backend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add the certificate (this ALSO adds the 443 block + HTTP→HTTPS redirect):
#   sudo certbot --nginx -d api.postpin.in
#
# Notes:
#  - The API sets its own CORS headers (WEB_ORIGIN) — do NOT add CORS here.
#  - Fastify runs with trustProxy:true; the X-Forwarded-For header below feeds
#    per-IP rate limits and lockout alerts. Keep those headers intact.
#  - Razorpay webhook URL for the dashboard:
#      https://api.postpin.in/v1/billing/webhook
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name api.postpin.in;

    access_log /var/log/nginx/postpin-backend.access.log;
    server_tokens off;
    error_log  /var/log/nginx/postpin-backend.error.log;

    add_header X-Content-Type-Options nosniff always;

    # Fastify bodyLimit is 8 MB (admin CSV import is the largest JSON body;
    # media uploads cap at 5 MB) — 10m gives headroom without inviting abuse.
    client_max_body_size 10m;

    gzip on;
    gzip_types application/json;
    gzip_min_length 1024;

    # Uploaded media (avatars, ticket attachments) — unique filenames, so a
    # week of browser cache is safe.
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Admin CSV import (~19k rows) can take a few seconds server-side;
        # the live India Post sync returns 202 instantly, so 90s is ample.
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
