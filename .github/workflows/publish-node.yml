name: Publish Node SDK

# Publishes packages/postpin-node to npm on a version tag pushed from this
# monorepo, tokenless via npm Trusted Publishing (OIDC) + build provenance:
#   git tag postpin-node/v0.1.1 && git push origin postpin-node/v0.1.1
#
# One-time npm setup: on npmjs.com open the @postpin/node package ->
# Settings -> Trusted Publisher -> GitHub Actions, with:
#   Organization/user: its-pradeependra | Repository: PostPin
#   Workflow filename: publish-node.yml | Environment: (leave blank)
#
# NOTE: v0.1.0 is already published (manually). Use this for the NEXT version
# onward — bump package.json first, then tag postpin-node/vX.Y.Z.

on:
  push:
    tags:
      - 'postpin-node/v*'

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for trusted publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # npm >= 11.5 is required for OIDC trusted publishing.
      - run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: packages/postpin-node
        run: npm ci

      - name: Publish to npm
        working-directory: packages/postpin-node
        run: npm publish --access public --provenance
