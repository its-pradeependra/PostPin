name: Publish Python SDK

# Publishes packages/postpin-python to PyPI via Trusted Publishing (OIDC) —
# no API token needed. Triggered by a version tag pushed from this monorepo:
#   git tag postpin-python/v0.1.0 && git push origin postpin-python/v0.1.0
#
# Requires a one-time "Trusted Publisher" (or pending publisher) on PyPI:
#   Project: postpin | Owner: its-pradeependra | Repo: PostPin
#   Workflow: publish-python.yml | Environment: pypi

on:
  push:
    tags:
      - 'postpin-python/v*'

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi # must match the Environment name on the PyPI publisher
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        working-directory: packages/postpin-python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/postpin-python/dist
